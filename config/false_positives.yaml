# ── Context-dependent IOCs ──────────────────────────────────────────────────────
# These are NOT false positives — they are legitimate IOCs that appear in real
# threat reports. However, they are FP-prone in isolation because they are widely
# used by both legitimate users and attackers. Flag them for correlation rather
# than standalone alerting.
#
# Examples: anonymization tools, file-sharing platforms, legitimate remote access
# tools, messaging apps — all used by threat actors but also by millions of legit users.

context_dependent_domains:
  # Anonymization / proxy infrastructure
  - torproject.org
  - www.torproject.org
  - onion.ly
  - privoxy.org

  # File sharing / exfiltration platforms (dual-use)
  - mega.nz
  - mega.co.nz
  - mediafire.com
  - anonfiles.com
  - transfer.sh
  - gofile.io
  - wetransfer.com
  - sendspace.com
  - dropbox.com
  - onedrive.live.com
  - drive.google.com

  # Messaging / C2-over-legitimate-service
  - telegram.org
  - t.me
  - discord.com
  - discordapp.com
  - cdn.discordapp.com

  # Legitimate remote access tools (frequently abused)
  - anydesk.com
  - teamviewer.com
  - logmein.com
  - screenconnect.com
  - connectwise.com
  - splashtop.com
  - rustdesk.com
  - ngrok.com
  - ngrok.io

  # Code / scripting platforms (commonly used for payload staging)
  - raw.githubusercontent.com
  - gist.github.com
  - paste.ee
  - hastebin.com
  - ghostbin.co

context_dependent_domain_suffixes:
  - .onion.ly
  - .ngrok.io
  - .ngrok-free.app
